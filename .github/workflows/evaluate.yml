name: RAG Evaluation Pipeline

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  evaluate:

    runs-on: self-hosted

    timeout-minutes: 180

    steps:

      ######################################################
      # Checkout
      ######################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ######################################################
      # Verify Python
      ######################################################

      - name: Verify Python
        shell: powershell
        run: |
          python --version
          pip --version

      ######################################################
      # Upgrade pip
      ######################################################

      - name: Upgrade pip
        shell: powershell
        run: |
          python -m pip install --upgrade pip

      ######################################################
      # Install dependencies
      ######################################################

      - name: Install Dependencies
        shell: powershell
        run: |
          pip install -r requirements.txt

      ######################################################
      # Create .env
      ######################################################

      - name: Create .env
        shell: powershell
        run: |
          "MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }}" | Out-File -FilePath .env -Encoding utf8

      ######################################################
      # Verify imports
      ######################################################

      - name: Verify Project Imports
        shell: powershell
        run: |
          python -c "import retriever"
          python -c "import reranker"
          python -c "import citation_guard"
          python -c "import rag_query"

      ######################################################
      # Verify Ollama
      ######################################################

      - name: Verify Ollama
        shell: powershell
        run: |
          ollama list

      ######################################################
      # Run Evaluation
      ######################################################

      - name: Run Offline Faithfulness Evaluation
        shell: powershell
        run: |
          python -m evaluation.evaluate

      ######################################################
      # Upload Results
      ######################################################

      - name: Upload Evaluation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-report
          path: |
            evaluation/results/report.json
            evaluation/results/predictions.csv

      ######################################################
      # Display Report
      ######################################################

      - name: Display Report
        if: always()
        shell: powershell
        run: |
          if (Test-Path "evaluation/results/report.json") {
              Write-Host ""
              Write-Host "====================================="
              Write-Host "Evaluation Report"
              Write-Host "====================================="
              Get-Content "evaluation/results/report.json"
              Write-Host "====================================="
          }